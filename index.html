<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weapon Registry</title>
    <style>
        /* Dark/Black Design */
        body {
            background-color: #0c0c0c;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        /* Sticky Header with Search Field on the top right */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background-color: #121212;
            padding: 15px 30px;
            border-bottom: 2px solid #1f1f1f;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);
        }
        
        h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
            color: #ffffff;
        }
        
        /* Search Container */
        .search-container {
            display: flex;
            gap: 8px;
        }
        
        .search-box {
            padding: 10px 16px;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            background-color: #1a1a1a;
            color: #ffffff;
            font-size: 14px;
            width: 280px;
            transition: border-color 0.3s;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #4a90e2;
        }
        
        .search-btn {
            padding: 10px 18px;
            background-color: #4a90e2;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .search-btn:hover {
            background-color: #357abd;
        }

        /* Main Content Layout */
        main {
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .waffen-liste {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Individual Weapon Entry Card */
        .waffen-eintrag {
            background-color: #141414;
            border: 1px solid #1f1f1f;
            border-radius: 8px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.4s, border-color 0.4s;
        }
        
        /* Visual feedback when matching search */
        .waffen-eintrag.highlight {
            background-color: #1b263b;
            border-color: #4a90e2;
            box-shadow: 0 0 12px rgba(74, 144, 226, 0.4);
        }
        
        .waffen-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        /* Weapon Name */
        .waffen-name {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }
        
        /* Detail Labels (codename & rarity) */
        .waffen-details {
            font-size: 13px;
            color: #888888;
            font-family: monospace;
        }

        .waffen-details span {
            color: #b0b0b0;
        }
        
        /* Gallery Number on the right */
        .gallery-nummer {
            font-size: 16px;
            font-weight: 700;
            color: #4a90e2;
            background-color: #1a1a1a;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #2d2d2d;
        }

        /* Error Banner */
        .error-message {
            color: #ff4d4d;
            text-align: center;
            line-height: 1.6;
            margin-top: 40px;
            background-color: #1f1111;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #3a1a1a;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Armory Dashboard</h1>
        <div class="search-container">
            <input type="text" id="searchField" class="search-box" placeholder="Search by name or gallery no...">
            <button id="searchBtn" class="search-btn">Search</button>
        </div>
    </header>

    <main>
        <div id="waffenListe" class="waffen-liste">
            </div>
        <div id="errorMessage" class="error-message"></div>
    </main>

    <script>
        let waffenData = [];

        // 1. Fetch data from itemrecords.json
        async function loadWaffenDaten() {
            try {
                const response = await fetch('itemrecords.json');
                if (!response.ok) {
                    throw new Error('File could not be read.');
                }
                waffenData = await response.json();
                renderWaffen(waffenData);
            } catch (error) {
                console.error(error);
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `
                    <strong>Error loading weapon data!</strong><br>
                    Make sure the file <code>itemrecords.json</code> is located in the exact same directory as this HTML file.<br><br>
                    <small><em>Note:</em> Opening HTML files via double-click (<code>file://</code>) restricts local JSON loading in modern browsers due to security policies (CORS). Please use a local server environment (e.g., VS Code "Live Server" or <code>python -m http.server</code>) to test it correctly.</small>
                `;
            }
        }

        // 2. Generate and inject DOM elements
        function renderWaffen(liste) {
            const container = document.getElementById('waffenListe');
            container.innerHTML = '';
            
            liste.forEach(waffe => {
                const eintrag = document.createElement('div');
                eintrag.className = 'waffen-eintrag';
                eintrag.id = 'waffe-' + waffe.gallery_number;

                // Added required formatting for codename and rarity labels
                eintrag.innerHTML = `
                    <div class="waffen-info">
                        <div class="waffen-name">${waffe.wepName}</div>
                        <div class="waffen-details">codename: <span>${waffe.codeName}</span></div>
                        <div class="waffen-details">rarity: <span>${waffe.rarity || 'N/A'}</span></div>
                    </div>
                    <div class="gallery-nummer">#${waffe.gallery_number}</div>
                `;
                container.appendChild(eintrag);
            });
        }

        // 3. Search and jump function
        function sucheUndSpringe() {
            const query = document.getElementById('searchField').value.trim().toLowerCase();
            if (!query) return;

            // Clear previous selections
            document.querySelectorAll('.waffen-eintrag').forEach(el => el.classList.remove('highlight'));

            // Filter data by matching weapon name or explicit gallery number
            const gefundeneWaffe = waffenData.find(waffe => 
                waffe.wepName.toLowerCase() === query || 
                waffe.wepName.toLowerCase().includes(query) ||
                waffe.gallery_number.toString() === query
            );

            if (gefundeneWaffe) {
                const zielElement = document.getElementById('waffe-' + gefundeneWaffe.gallery_number);
                if (zielElement) {
                    zielElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    zielElement.classList.add('highlight');
                }
            } else {
                alert('Weapon or gallery number not found.');
            }
        }

        // Setup Event Listeners
        document.getElementById('searchBtn').addEventListener('click', sucheUndSpringe);
        document.getElementById('searchField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sucheUndSpringe();
            }
        });

        window.addEventListener('DOMContentLoaded', loadWaffenDaten);
    </script>
</body>
</html>
